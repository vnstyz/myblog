server:
  port: 8080

spring:

  application:
    name: myblog

  thymeleaf:
    cache: false  # 开发时关闭缓存
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/myblog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false


mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: site.vnstyz.myblog.entity


logging:
  level:
    site.vnstyz.myblog: debug
    root: warn

blog:
  site:
    # 站点名称，显示在页脚版权与标题后缀
    name: MyBlog
    # 联系邮箱，显示在页脚「联系方式」
    email: johnsmithvnstzy@gmail.com
  like:
    # 同一 IP 对同一篇文章的点赞冷却时长（分钟），冷却期内不可重复点赞
    cooldown-minutes: 60
  comment:
    # 同一 IP 的评论冷却时长（秒），冷却期内不可重复评论
    cooldown-seconds: 60
    # 评论内容最大字符数（与 CommentRequest 的 @Size 校验保持一致）
    max-length: 500