<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - MyBlog'">文章详情 - MyBlog</title>
    <link rel="stylesheet" th:href="@{/css/blog.css}">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

    <div class="stars-container"></div>
    <div class="grid-bg"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="nav-brand">
                <span class="brand-icon"><i class="ri-quill-pen-line"></i></span>
                <span>MyBlog</span>
            </a>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/about">关于</a></li>
            </ul>
            <button class="nav-toggle" aria-label="菜单">
                <i class="ri-menu-line"></i>
            </button>
        </div>
    </nav>

    <!-- 文章详情 -->
    <div class="article-detail-wrapper">
        <article>
            <header class="article-detail-header">
                <span class="article-detail-category"
                      th:classappend="${article.categoryName == '生活随笔'} ? 'cat-life' : (${article.categoryName == '学习笔记'} ? 'cat-note' : 'cat-tech')"
                      th:text="${article.categoryName != null ? article.categoryName : '未分类'}">技术分享</span>
                <h1 class="article-detail-title" th:text="${article.title}">文章标题</h1>
                <div class="article-detail-meta">
                    <span th:if="${article.createdByUsername != null}">
                        <i class="ri-user-3-line"></i> <span th:text="${article.createdByUsername}">作者</span>
                    </span>
                    <span th:if="${article.publishedTime != null}">
                        <i class="ri-calendar-line"></i> <span th:text="${#temporals.format(article.publishedTime, 'yyyy-MM-dd HH:mm')}">发布时间</span>
                    </span>
                    <span th:if="${article.createdTime != null and article.publishedTime == null}">
                        <i class="ri-calendar-line"></i> <span th:text="${#temporals.format(article.createdTime, 'yyyy-MM-dd HH:mm')}">创建时间</span>
                    </span>
                    <span>
                        <i class="ri-eye-line"></i> <span th:text="${article.viewCount}">0</span> 浏览
                    </span>
                    <span>
                        <i class="ri-chat-3-line"></i> <span th:text="${article.commentCount}">0</span> 评论
                    </span>
                </div>
            </header>

            <div class="article-detail-body fade-up" th:utext="${article.contentHtml}">
                文章内容加载中...
            </div>

            <div style="text-align: center; padding: 40px 0 20px;">
                <button class="like-btn">
                    <i class="ri-heart-line"></i>
                    <span>点赞</span>
                    <span class="like-count" th:text="${article.likeCount}">0</span>
                </button>
            </div>
        </article>

        <div style="text-align: center; padding: 20px 0 60px;">
            <a href="/" class="like-btn" style="text-decoration: none;">
                <i class="ri-arrow-left-line"></i> 返回首页
            </a>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-col">
                <h4>关于本站</h4>
                <p>一个基于 Spring Boot + MyBatis + Thymeleaf 构建的个人博客。</p>
            </div>
            <div class="footer-col">
                <h4>快速链接</h4>
                <a href="/">首页</a>
                <a href="/about">关于我</a>
            </div>
            <div class="footer-col">
                <h4>联系方式</h4>
                <a href="mailto:admin@example.com"><i class="ri-mail-line"></i> admin@example.com</a>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2024 MyBlog. Powered by Spring Boot. All rights reserved.
        </div>
    </footer>

    <script th:src="@{/js/blog.js}"></script>
</body>
</html>
