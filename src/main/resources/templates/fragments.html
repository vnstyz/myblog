<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="siteHead">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/blog.css}">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<!-- 星空粒子背景 -->
<div class="stars-container" th:fragment="siteBackground"></div>
<!-- 网格背景 -->
<div class="grid-bg" th:fragment="siteGridBg"></div>

<!-- ========== 导航栏 ========== -->
    <nav th:fragment="siteNavbar(active)" class="navbar">
    <div class="navbar-inner">
        <a href="/" class="nav-brand">
            <span class="brand-icon"><i class="ri-quill-pen-line"></i></span>
            <span>MyBlog</span>
        </a>
        <ul class="nav-links">
            <li><a href="/" th:classappend="${active} == 'home' ? 'active'">首页</a></li>
            <li><a href="/about" th:classappend="${active} == 'about' ? 'active'">关于</a></li>
            <li><a href="#footer">联系</a></li>
            <li sec:authorize="hasRole('ADMIN')"><a href="/admin" th:classappend="${active} == 'admin' ? 'active'">后台管理</a></li>
            <li sec:authorize="!isAuthenticated()"><a href="/login">登录</a></li>
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" class="nav-logout-form">
                    <button type="submit" class="nav-logout-btn">退出</button>
                </form>
            </li>
        </ul>
        <button class="nav-toggle" aria-label="菜单">
            <i class="ri-menu-line"></i>
        </button>
    </div>
</nav>


<!-- ========== Hero 区域 ========== -->
<section th:fragment="heroSection(title, subtitle, showStats, showContactBtn)" class="hero-section">
    <div class="hero-bg"></div>
    <div class="hero-content">
        <div class="hero-avatar"><i class="ri-code-line"></i></div>
        <h1 class="hero-title" th:text="${title}">首页</h1>
        <p class="hero-subtitle" th:text="${subtitle}">
            分享技术心得，记录生活点滴，探索编程世界的无限可能。
        </p>
        <a th:if="${showContactBtn}" href="#footer" class="hero-contact-btn">
            <i class="ri-mail-line"></i> 联系我
        </a>
        <div class="hero-stats" th:if="${showStats}">
            <div class="hero-stat">
                <div class="hero-stat-number" th:text="${articleCount}">0</div>
                <div class="hero-stat-label">文章</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-number" th:text="${totalViews}">0</div>
                <div class="hero-stat-label">浏览</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-number" th:text="${totalLikes}">0</div>
                <div class="hero-stat-label">点赞</div>
            </div>
        </div>
    </div>
</section>

<!-- ========== 页脚 ========== -->
<footer th:fragment="siteFooter" class="site-footer" id="footer">
    <div class="footer-inner">
        <div class="footer-col">
            <h4>关于本站</h4>
            <p>一个基于 Spring Boot + MyBatis + Thymeleaf 构建的个人博客，记录学习与成长的点滴。</p>
        </div>
        <div class="footer-col">
            <h4>快速链接</h4>
            <a href="/">首页</a>
            <a href="/about">关于我</a>
        </div>
        <div class="footer-col">
            <h4>联系方式</h4>
            <a href="mailto:johnsmithvnstzy@gmail.com"><i class="ri-mail-line"></i> johnsmithvnstzy@gmail.com</a>
        </div>
    </div>
    <div class="footer-bottom">
        &copy; 2026 MyBlog. Powered by Spring Boot. All rights reserved.
    </div>
</footer>

</body>
</html>
