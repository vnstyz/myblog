<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - MyBlog'">管理员登录 - MyBlog</title>
    <th:block th:replace="~{fragments :: siteHead}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments :: siteBackground}"></th:block>
    <th:block th:replace="~{fragments :: siteGridBg}"></th:block>
    <th:block th:replace="~{fragments :: siteNavbar('login')}"></th:block>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-card-header">
                <div class="login-card-icon">
                    <i class="ri-shield-user-line"></i>
                </div>
                <h1 class="login-card-title">管理员登录</h1>
                <p class="login-card-subtitle">欢迎回来，请登录以管理博客内容</p>
            </div>

            <div class="login-error" th:if="${error}">
                <i class="ri-error-warning-line"></i>
                <span>用户名或密码错误，请重试</span>
            </div>

            <form th:action="@{/login}" method="post" class="login-form">
                <div class="login-form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" class="login-input" placeholder="请输入用户名" required autofocus>
                </div>
                <div class="login-form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" class="login-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
        </div>
    </main>

    <th:block th:replace="~{fragments :: siteFooter}"></th:block>
    <script th:src="@{/js/blog.js}"></script>
</body>
</html>
